<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Tracker - Alistar Agente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body id='registro' class="d-flex align-items-center py-4 min-vh-100">

    <div class="container w-100 m-auto" style="max-width: 500px;">
        <div class="card border-secondary shadow-lg rounded-4 bg-dark/90">
            <div class="card-body p-5">
                
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus " style="font-size: 3.5rem; color:rgb(28, 28, 207)" ></i>
                    <h2 class="fw-bold mt-2 text-white">Criar Conta</h2>
                    <p class="text-muted small">Crie o seu perfil para começar a mapear o seu arsenal de jogos</p>
                </div>

                <form action="php/registrar-user.php" method="POST" class="needs-validation" novalidate>
                    
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control bg-dark text-light" id="nome" name="nome" placeholder="Nome Completo" required>
                        <label for="nome" class="text-muted">Nome Completo *</label>
                        <div class="invalid-feedback">Por favor, insira o seu nome.</div>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="text" class="form-control bg-dark text-light" id="nome_usuario" name="nome_usuario" placeholder="Nome de Usuário" required>
                        <label for="nome_usuario" class="text-muted">Nome de Usuário *</label>
                        <div class="invalid-feedback">Escolha um nome de usuário para o sistema.</div>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="email" class="form-control bg-dark text-light" id="email" name="email_usuario" placeholder="nome@exemplo.com" required>
                        <label for="email" class="text-muted">E-mail *</label>
                        <div class="invalid-feedback">Insira um endereço de e-mail válido.</div>
                    </div>

                    <div class="form-floating mb-4">
                        <input type="password" class="form-control bg-dark text-light" id="senha" name="senha_usuario" placeholder="Senha" required>
                        <label for="senha" class="text-muted">Senha *</label>
                        <div class="invalid-feedback">Crie uma senha de acesso forte.</div>
                    </div>

                    <div class="d-grid">
                        <button class="btn btn-outline-primary btn-lg fw-semibold shadow-sm" type="submit">
                            <i class="bi bi-check-circle"></i> Finalizar Cadastro
                        </button>
                    </div>
                </form>
                
                <div class="text-center mt-4 border-top pt-3 border-secondary">
                    <p class="small text-muted mb-1">Já possui um perfil de agente?</p>
                    <a href="login.html" class="text-decoration-none text-primary fw-medium small">
                        <i class="bi bi-box-arrow-in-right"></i> Ir para o Login
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/script.js"></script>
</body>
</html>
