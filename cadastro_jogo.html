<!-- Local para inserção de informações sobre o jogo como 'Nome do jogo*', 'Status*', 'Nota*' e 'Descrição'  Os campos com '*' são obrigatirio responder-->
<div class="container mt-5" style="padding: 40px 20px;">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white w-200">
                    <h4 class="mb-2">Adicionar Novo Jogo</h4>
                </div>
                <div class="card-body">
                    <form action="php/cadastro.php" method="POST" id="formCadastro" class="needs-validation" novalidate>
                        

                        <!-- Nome do jogo e apresenta uma mensagem de erro caso não for digitado nada-->
                        <div class="mb-3">
                            <label for="nome_jogo" class="form-label">Nome do Jogo *</label>
                            <input type="text" class="form-control" id="nome_jogo" name="nome_jogo" required>
                            <div class="invalid-feedback">Por favor, insira o nome do jogo.</div>
                        </div>
                        
                        <!-- Status do jogos com os niveis: jogando, já zerei, platinado. apresenta tambem mensagem de erro caso não for ditado-->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="status_jogo" class="form-label">Status *</label>
                                <select class="form-select" id="status_jogo" name="status_jogo" required>
                                    <option value="" selected disabled>Escolha...</option>
                                    <option value="Jogando">Jogando</option>
                                    <option value="Já zerei">Zerado</option>
                                    <option value="Platinado">Platinado</option>
                                </select>
                                <div class="invalid-feedback">Selecione o status do jogo.</div>
                            </div>
                            <!-- Nota do jogo variando de 0 a 10. apresenta mensagem de erro caso não for digitado-->

                            <div class="col-md-6 mb-3">
                                <label for="nota_jogo" class="form-label">Nota (0 a 10) *</label>
                                <input type="number" class="form-control" id="nota_jogo" name="nota_jogo" min="0" max="10" required>
                                <div class="invalid-feedback">Por favor, insira uma nota para o jogo.</div>
                            </div>
                        </div>
                        <!-- Descrição do jogo, varia de zero a trezentos caracteres, não apresenta mensagem de erro-->
                        <div class="mb-3">
                            <label for="review_jogo" class="form-label">Sua Review</label>
                            <textarea class="form-control" id="review_jogo" name="review_jogo" rows="4" maxlength="300"></textarea>
                            <div class="form-text text-end" id="contador">0 / 300 caracteres</div>
                        </div>
                        
                        <!-- Botão de validação para enviar as informações relacionado ao jogo-->
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success"><i class="bi bi-save"></i> Salvar na Biblioteca</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
