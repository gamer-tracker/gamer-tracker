<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Tracker - Acessar Base</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    </sty>
</head>
<body id ='login' class="d-flex align-items-center py-4 min-vh-100">

    <div class="container w-100 m-auto" style="max-width: 450px;">
        <div class="card border-secondary shadow-lg rounded-4 bg-dark/90">
            <div class="card-body p-5">
                
                <div class="text-center mb-4">
                    <i class="bi bi-controller text-primary" style="font-size: 3.5rem;"></i>
                    <h2 class="fw-bold mt-2 text-white">Acessar Base</h2>
                    <p class="text-muted small">Entre com as suas credenciais de agente</p>
                </div>

                <form id='teste' action="php/login.php" method="POST" class="needs-validation" novalidate>
                    
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control bg-dark text-light" id="nome_usuario" name="nome_usuario" placeholder="Nome de usuário" required>
                        <label for="nome_usuario" class="text-muted">Nome de Usuário *</label>
                        <div class="invalid-feedback">Por favor, insira seu nome de usuário.</div>
                    </div>

                    <div class="form-floating mb-4">
                        <input type="password" class="form-control bg-dark text-light" id="senha" name="senha" placeholder="Senha" required>
                        <label for="senha" class="text-muted">Senha *</label>
                        <div class="invalid-feedback">A senha é obrigatória.</div>
                    </div>

                    <div class="d-flex gap-2">
                        <button class="btn btn-primary w-50 py-2 fw-semibold shadow-sm" type="submit">
                            <i class="bi bi-box-arrow-in-right"></i> Entrar
                        </button>
                        
                        <a href="registro.html" class="btn btn-outline-light w-50 py-2 fw-semibold shadow-sm">
                            <i class="bi bi-person-plus"></i> Criar Conta
                        </a>
                    </div>
                </form>
                
                <div class="text-center mt-4">
                    <a href="index.html" class="text-decoration-none text-secondary small"><i class="bi bi-arrow-left"></i> Voltar para a Tela Inicial</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
