<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Tracker - Editar Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body id="atualizar_dados" class="d-flex align-items-center py-4 min-vh-100">

    <div class="container w-100 m-auto" style="max-width: 600px;">
        
        <div class="card border-warning shadow-lg rounded-4 bg-dark/90">
            <div class="card-body p-5">
                
                <div class="text-center mb-4">
                    <i class="bi bi-pencil-square text-warning" style="font-size: 3rem;"></i>
                    <h2 class="fw-bold mt-2 text-white">Atualizar Dados</h2>
                    <p class="text-muted small">Altere as informações do seu perfil de agente</p>
                </div>

                <form action="php/atualizar_perfil.php" method="POST" class="needs-validation" novalidate>
                    
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label for="nome" class="form-label text-muted small mb-1">Nome Completo</label>
                            <input type="text" class="form-control bg-dark text-light border-secondary" id="nome" name="nome" value="John Marston" required>
                            <div class="invalid-feedback">O nome não pode ficar vazio.</div>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label for="idade" class="form-label text-muted small mb-1">Idade</label>
                            <input type="number" class="form-control bg-dark text-light border-secondary" id="idade" name="idade" min="0" value="38" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="nome_usuario" class="form-label text-muted small mb-1">Nome de Usuário</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-muted">@</span>
                            <input type="text" class="form-control bg-dark text-light border-secondary" id="nome_usuario" name="nome_usuario" value="john_m_rdr" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="email" class="form-label text-muted small mb-1">E-mail</label>
                        <input type="email" class="form-control bg-dark text-light border-secondary" id="email" name="email" value="john.m@rdr.com" required>
                    </div>

                    <hr class="border-secondary mb-4">

                    <p class="text-warning small mb-3"><i class="bi bi-shield-lock"></i> Preencha apenas se quiser mudar sua senha atual:</p>
                    <div class="mb-4">
                        <input type="password" class="form-control bg-dark text-light border-secondary" id="nova_senha" name="nova_senha" placeholder="Digite a nova senha">
                    </div>

                    <div class="d-flex gap-2">
                        <button class="btn btn-warning w-50 fw-semibold text-dark shadow-sm" type="submit">
                            <i class="bi bi-save"></i> Salvar Alterações
                        </button>
                        <a href="perfil.html" class="btn btn-outline-light w-50 fw-semibold shadow-sm">
                            Cancelar
                        </a>
                    </div>
                </form>
                
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
