<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Game Tracker - Editar Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body id="atualizar_dados" class="d-flex align-items-center py-4 min-vh-100">
    <div class="container w-100 m-auto" style="max-width: 600px;">
        <div class="card border-warning shadow-lg rounded-4 bg-dark/90">
            <div class="card-body p-5">
                <form action="php/atualizar_perfil.php" method="POST" id="formAtualizar" class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label for="nome" class="form-label text-muted small">Nome Completo</label>
                        <input type="text" class="form-control" id="nome" name="nome" required>
                    </div>
                    <div class="mb-4">
                        <label for="email" class="form-label text-muted small">E-mail</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-4">
                        <label class="text-warning small">Nova Senha (opcional):</label>
                        <input type="password" class="form-control" name="nova_senha" placeholder="Digite a nova senha">
                    </div>
                    <button class="btn btn-warning w-100 fw-semibold text-dark" type="submit">Salvar Alterações</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const res = await fetch('php/dados-perfil.php');
            const result = await res.json();
            if (result.status === 'success') {
                document.getElementById('nome').value = result.data.nome;
                document.getElementById('email').value = result.data.email;
            }
        });
    </script>
</body>
</html>
